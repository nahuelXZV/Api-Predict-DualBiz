{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<div style="max-width:400px; margin:60px auto; padding:32px; border:1px solid #444; border-radius:8px;">
    <h1 style="text-align:center; margin-bottom:24px;">{% trans "Iniciar sesión" %}</h1>

    {% if form.errors %}
    <p style="color:red; text-align:center;">
        {% trans "Usuario o contraseña incorrectos." %}
    </p>
    {% endif %}

    <form method="post" action="{{ app_path }}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div style="margin-bottom:16px;">
            <label for="id_username">{% trans "Usuario" %}</label>
            <input
                id="id_username"
                type="text"
                name="username"
                autofocus
                autocapitalize="none"
                autocomplete="username"
                style="width:100%; padding:8px; margin-top:4px; box-sizing:border-box; border-radius:4px; border:1px solid #555; background:#222; color:#fff;"
            >
        </div>

        <div style="margin-bottom:24px;">
            <label for="id_password">{% trans "Contraseña" %}</label>
            <input
                id="id_password"
                type="password"
                name="password"
                autocomplete="current-password"
                style="width:100%; padding:8px; margin-top:4px; box-sizing:border-box; border-radius:4px; border:1px solid #555; background:#222; color:#fff;"
            >
        </div>

        <button
            type="submit"
            style="width:100%; padding:10px; background:#0f3460; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:16px;"
        >
            {% trans "Ingresar" %}
        </button>
    </form>
</div>
{% endblock %}
